binary_sensor:
  - platform: gpio
    id: encoder_pin_a
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
      allow_other_uses: true
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 5;'
          then:
            # Page 5 - Color Picker - Previous color
            - lambda: |-
                static const uint32_t colors[] = {0xFF0000, 0x00FF00, 0x0000FF, 0xFFFF00, 0x00FFFF, 0xFF00FF, 0xFFFFFF, 0xFF8C00, 0x800080, 0xFFC0CB};
                static const char* names[] = {"Red", "Green", "Blue", "Yellow", "Cyan", "Magenta", "White", "Orange", "Purple", "Pink"};
                int count = 10;
                id(color_page_index) = (id(color_page_index) - 1 + count) % count;
                int idx = id(color_page_index);
                lv_obj_set_style_bg_color(color_bg, lv_color_hex(colors[idx]), LV_PART_MAIN);
            - lvgl.label.update:
                id: color_name_label
                text: !lambda |-
                  static const char* names[] = {"Red", "Green", "Blue", "Yellow", "Cyan", "Magenta", "White", "Orange", "Purple", "Pink"};
                  return names[id(color_page_index)];
      - if:
          condition:
            lambda: 'return id(current_page) == 6;'
          then:
            # Page 6 - Percentage Control - Decrease
            - lambda: |-
                if (id(percentage_value) > 0) {
                  id(percentage_value)--;
                }
            - lvgl.arc.update:
                id: percentage_arc
                value: !lambda 'return id(percentage_value);'
            - lvgl.label.update:
                id: percentage_label
                text: !lambda |-
                  static char buf[8];
                  snprintf(buf, sizeof(buf), "%d%%", id(percentage_value));
                  return buf;
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming from encoder"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

  - platform: gpio
    id: encoder_pin_b
    pin:
      number: GPIO8
      mode: INPUT_PULLUP
      allow_other_uses: true
    on_press:
      - if:
          condition:
            lambda: 'return id(current_page) == 5;'
          then:
            # Page 5 - Color Picker - Next color
            - lambda: |-
                static const uint32_t colors[] = {0xFF0000, 0x00FF00, 0x0000FF, 0xFFFF00, 0x00FFFF, 0xFF00FF, 0xFFFFFF, 0xFF8C00, 0x800080, 0xFFC0CB};
                static const char* names[] = {"Red", "Green", "Blue", "Yellow", "Cyan", "Magenta", "White", "Orange", "Purple", "Pink"};
                int count = 10;
                id(color_page_index) = (id(color_page_index) + 1) % count;
                int idx = id(color_page_index);
                lv_obj_set_style_bg_color(color_bg, lv_color_hex(colors[idx]), LV_PART_MAIN);
            - lvgl.label.update:
                id: color_name_label
                text: !lambda |-
                  static const char* names[] = {"Red", "Green", "Blue", "Yellow", "Cyan", "Magenta", "White", "Orange", "Purple", "Pink"};
                  return names[id(color_page_index)];
      - if:
          condition:
            lambda: 'return id(current_page) == 6;'
          then:
            # Page 6 - Percentage Control - Increase
            - lambda: |-
                if (id(percentage_value) < 100) {
                  id(percentage_value)++;
                }
            - lvgl.arc.update:
                id: percentage_arc
                value: !lambda 'return id(percentage_value);'
            - lvgl.label.update:
                id: percentage_label
                text: !lambda |-
                  static char buf[8];
                  snprintf(buf, sizeof(buf), "%d%%", id(percentage_value));
                  return buf;
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming from encoder"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

lvgl:
  on_idle:
    timeout: 30s
    then:
      - logger.log: "LVGL is idle - preparing for deep sleep"
      - light.turn_off: display_backlight
      - lvgl.pause:
      - delay: 1800s
      - logger.log: "Entering deep sleep"
      - deep_sleep.enter: deep_sleep_control

  pages:

    # Page 1 - Deepseek TUI
    - id: page_4
      widgets:
        - obj:
            id: background3
            x: 0
            y: 0
            width: 360
            height: 360
            bg_color: 0x000000
            border_width: 0
            pad_all: 0

        - label:
            id: deepseek_label
            align: center
            text: "Deepseek TUI"
            text_font: roboto_32
            text_color: 0xFFFFFF

      on_swipe_left:
        - lambda: 'id(current_page) = 6;'
        - lvgl.page.show:
            id: page_6
            animation: MOVE_LEFT

      on_swipe_right:
        - lambda: 'id(current_page) = 5;'
        - lvgl.page.show:
            id: page_5
            animation: MOVE_RIGHT

    # Page 2 - Color Picker
    - id: page_5
      widgets:
        - obj:
            id: color_bg
            x: 0
            y: 0
            width: 360
            height: 360
            bg_color: 0xFF0000
            border_width: 0
            pad_all: 0

        - label:
            id: color_name_label
            align: center
            y: -20
            text: "Red"
            text_font: roboto_88
            text_color: 0x000000

        - label:
            id: color_hint_label
            align: center
            y: 60
            text: "Scroll to change"
            text_font: roboto_20
            text_color: 0x000000

      on_swipe_left:
        - lambda: 'id(current_page) = 4;'
        - lvgl.page.show:
            id: page_4
            animation: MOVE_LEFT

      on_swipe_right:
        - lambda: 'id(current_page) = 6;'
        - lvgl.page.show:
            id: page_6
            animation: MOVE_RIGHT

    # Page 3 - Percentage Control
    - id: page_6
      widgets:
        - obj:
            id: percentage_bg
            x: 0
            y: 0
            width: 360
            height: 360
            bg_color: 0x1A1A2E
            border_width: 0
            pad_all: 0

        - arc:
            id: percentage_arc
            align: center
            arc_rounded: false
            width: 260
            height: 260
            arc_color: 0x00D2FF
            arc_width: 18
            bg_color: 0x333355
            bg_opa: 80
            arc_opa: 100

        - label:
            id: percentage_label
            align: center
            y: -8
            text: "50%"
            text_font: roboto_88
            text_color: 0xFFFFFF

        - label:
            id: percentage_hint_label
            align: center
            y: 70
            text: "Scroll to adjust"
            text_font: roboto_20
            text_color: 0xAAAAAA

      on_swipe_left:
        - lambda: 'id(current_page) = 4;'
        - lvgl.page.show:
            id: page_4
            animation: MOVE_LEFT

      on_swipe_right:
        - lambda: 'id(current_page) = 5;'
        - lvgl.page.show:
            id: page_5
            animation: MOVE_RIGHT

sensor:
